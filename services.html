    <script>
        const supabaseUrl = 'https://yrpfevxzocpedpthknhi.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlycGZldnh6b2NwZWRwdGhrbmhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NDg5NjIsImV4cCI6MjA5NzUyNDk2Mn0.GMxuE_B17gwzUaqPlaHzwlY20i8XYaMNOoxY9WGijLw';

        async function loadServicesPage() {
            const container = document.getElementById('services-container');
            
            try {
                const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

                let { data: services, error } = await supabase
                .from('services')
                .select('*')
                .eq('status', 'active')
                .order('sort_order', { ascending: true });

                if (error) {
                    container.innerHTML = `<div class="font-mono text-xs text-red-500 bg-red-950/20 border border-red-900/50 p-4 rounded-xl inline-block">Error: Please try again later.</div>`;
                    return;
                }

                if (!services || services.length === 0) {
                    container.innerHTML = '<div class="font-mono text-xs text-slate-500">No active services found.</div>';
                    return;
                }

                let gridHtml = '<div class="services-grid">';
                
                services.forEach(service => {
                    const databaseLink = service.whatsapp_url || service.link_url || '';
                    const customUrl = databaseLink.trim() !== '' ? databaseLink.trim() : 'https://wa.me/';

                    const buttonText = service.cta_text && service.cta_text.trim() !== '' 
                        ? service.cta_text.trim() 
                        : 'Inquiry Service';

                    const learnMoreMarkup = service.subdomain_url && service.subdomain_url.trim() !== ''
                        ? `<a href="${service.subdomain_url.trim()}" target="_blank" rel="noopener noreferrer" class="w-full inline-flex items-center justify-center gap-2 bg-slate-950/60 hover:bg-slate-900/40 text-slate-400 hover:text-white border border-slate-900 hover:border-slate-800 p-3 rounded-lg text-xs font-mono font-bold tracking-widest transition-all duration-200 group">
                            <span>EXPLORE SUBDOMAIN</span> <i class="fa-solid fa-arrow-right text-[10px] text-slate-600 group-hover:text-emerald-400 group-hover:translate-x-0.5 transition-all"></i>
                           </a>`
                        : '';

                    const imageMarkup = service.image_url 
                        ? `<img src="${service.image_url}" class="w-[200px] h-[150px] object-cover rounded-lg mx-auto mb-4 border border-slate-900/60" alt="${service.title || 'Service Image'}">`
                        : '';

                    gridHtml += `
                        <div class="bg-slate-950/30 border border-slate-900 hover:border-emerald-500/30 rounded-2xl p-6 flex flex-col justify-between transition-all duration-300 hover:-translate-y-1 shadow-lg shadow-slate-950/40">
                            <div>
                                ${imageMarkup}
                                <h3 class="text-white font-mono font-bold text-base tracking-tight text-center mb-2">${service.title || 'Untitled Service'}</h3>
                                <p class="text-xs text-slate-400 font-normal leading-relaxed text-center mb-6 max-w-sm mx-auto">${service.description || 'No description provided.'}</p>
                            </div>
                            <div class="flex flex-col gap-2.5 mt-auto">
                                <a href="${customUrl}" target="_blank" rel="noopener noreferrer" class="w-full inline-flex items-center justify-center gap-2 bg-transparent text-emerald-400 hover:text-slate-950 border border-emerald-500/40 hover:bg-emerald-400 p-3 rounded-lg text-xs font-mono font-bold tracking-widest transition-all duration-300 hover:shadow-[0_0_15px_rgba(16,185,129,0.2)]">
                                    <i class="fa-brands fa-whatsapp text-sm"></i> <span>${buttonText.toUpperCase()}</span>
                                </a>
                                ${learnMoreMarkup}
                            </div>
                        </div>
                    `;
                });

                gridHtml += '</div>';
                container.innerHTML = gridHtml;

            } catch (err) {
                container.innerHTML = `<div class="font-mono text-xs text-red-500 bg-red-950/20 border border-red-900/50 p-4 rounded-xl inline-block">Error: Please try again later.</div>`;
            }
        }
